<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded black background -->
  <rect width="64" height="64" rx="14" fill="#000000"/>

  <!-- Shopping bag handles -->
  <path d="M22 24 V18 a10 10 0 0 1 20 0 V24"
        fill="none" stroke="#FFFFFF" stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Shopping bag body, orange -->
  <path d="M14 24 H50 L47 52 a4 4 0 0 1 -4 4 H21 a4 4 0 0 1 -4 -4 Z"
        fill="#FF8A00"/>

  <!-- Highlight stripe -->
  <path d="M16 28 H48"
        stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Monogram S -->
  <text x="50%" y="46" text-anchor="middle"
        font-family="'Trebuchet MS', Roboto, Arial, sans-serif"
        font-size="20" font-weight="800" fill="#000000">S</text>
</svg>
